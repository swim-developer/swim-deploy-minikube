  <rect x="600" y="60" width="140" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="670" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">SWIM Services</text>
  <text x="670" y="95" text-anchor="middle" font-size="10" fill="#546e7a">consumer � provider</text>

  <text x="380" y="165" text-anchor="middle" font-size="10" fill="#78909c">Automated local setup  runs a full SWIM stack on a developer laptop using Minikube + Podman</text>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#757575"/>
