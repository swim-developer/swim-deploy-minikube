  <text x="85" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">Ansible Playbook</text>
  <text x="85" y="97" text-anchor="middle" font-size="10" fill="#546e7a">swim-local-setup.yml</text>

  <line x1="150" y1="85" x2="200" y2="85" stroke="#757575" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Minikube -->
  <rect x="200" y="50" width="160" height="70" rx="6" fill="#e0f2f1" stroke="#00695c" stroke-width="2"/>
  <text x="280" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">Minikube</text>
  <text x="280" y="90" text-anchor="middle" font-size="10" fill="#546e7a">Podman driver</text>
  <text x="280" y="104" text-anchor="middle" font-size="10" fill="#546e7a">SWIM Internal CA</text>

  <line x1="360" y1="75" x2="410" y2="65" stroke="#757575" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="95" x2="410" y2="105" stroke="#757575" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AMQ -->
  <rect x="410" y="45" width="140" height="34" rx="6" fill="#e8eaf6" stroke="#3949ab" stroke-width="1"/>
  <text x="480" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a237e">AMQ Artemis Operator</text>
  <text x="480" y="71" text-anchor="middle" font-size="9" fill="#546e7a">ActiveMQArtemis CR</text>

  <!-- cert-manager -->
  <rect x="410" y="88" width="140" height="34" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="480" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">cert-manager</text>
