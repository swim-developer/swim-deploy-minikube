<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" font-family="Arial, sans-serif">

  <text x="380" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#212121">swim-deploy-minikube  Local Kubernetes Environment</text>

  <!-- Ansible -->
